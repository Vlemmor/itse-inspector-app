<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licenciatec | Smart Inspection Copilot</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="mode-architect">
    <div class="app-container">
        <!-- STEP 1: ROLE SELECTOR -->
        <section id="step-1" class="step-screen active">
            <div class="selector-card glass-card">
                <h1 class="logo-text">LICENCIA<span>TEC</span></h1>
                <h2 style="color: #000; margin-bottom: 30px;">Seleccione Especialidad</h2>
                <div class="role-grid">
                    <button class="role-btn" data-role="architect">
                        <span class="icon">🏗️</span>
                        <span class="btn-label">Arquitectura / Seguridad</span>
                    </button>
                    <button class="role-btn" data-role="electrical">
                        <span class="icon">⚡</span>
                        <span class="btn-label">Ingeniero Electricista</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- STEP 2: GENERAL DATA -->
        <section id="step-2" class="step-screen">
            <header class="app-header">
                <button class="btn-back">⬅️</button>
                <span class="brand">DATOS <span>GENERALES</span></span>
            </header>
            <main class="form-area">
                <div class="glass-card">
                    <div class="form-group">
                        <label>Sede / Planta</label>
                        <input type="text" id="site-name" placeholder="Ej. Planta Huachipa">
                    </div>
                    <div class="form-group">
                        <label>Fecha de Inspección</label>
                        <input type="date" id="inspection-date">
                    </div>
                    <div class="form-group">
                        <label>Inspector Responsable</label>
                        <input type="text" id="inspector-name" placeholder="Nombre completo">
                    </div>
                    <button id="btn-start-inspection" class="btn-primary">INICIAR INSPECCIÓN</button>
                </div>
            </main>
        </section>

        <!-- STEP 3: INSPECTION CONSOLE -->
        <section id="step-3" class="step-screen">
            <header class="app-header">
                <div class="header-content">
                    <span class="brand">INSPEC<span>CIÓN</span></span>
                    <div class="specialty-indicator" id="current-specialty">Arquitectura</div>
                </div>
            </header>

            <main class="content-area">
                <div id="hallazgos-feed" class="hallazgos-container">
                    <div class="empty-state">
                        <div class="empty-icon">📷</div>
                        <p>Capture un hallazgo para comenzar</p>
                    </div>
                </div>
            </main>

            <!-- WhatsApp Style Input Bar -->
            <footer class="observation-bar">
                <div class="input-container">
                    <button id="btn-camera" class="round-icon-btn">📷</button>
                    <input type="text" id="manual-text" placeholder="Escriba una observación...">
                    <button id="btn-voice" class="round-icon-btn mic-btn">🎤</button>
                    <button id="btn-send" class="round-icon-btn send-btn">➡️</button>
                </div>
                <div class="status-row">
                    <button id="btn-finish" class="btn-finish-minimal">FINALIZAR INFORME ✅</button>
                </div>
            </footer>
        </section>

        <!-- Hidden Inputs for Hardware -->
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">

        <!-- AI Process Indicator -->
        <div id="ai-status" class="ai-status">
            <span class="ai-icon">✨</span>
            <span id="ai-msg">IA Procesando...</span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
